# Static application security testing (SAST) via CodeQL — external review finding G.
# Free for public repositories; runs on push/PR to master plus a weekly sweep.
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '30 5 * * 1'   # Mondays 05:30 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual
          # Carries justified rule exclusions (e.g. CSRF-off on a stateless bearer-token API).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build (CodeQL traced)
        run: mvn -B -ntp -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
