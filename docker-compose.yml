# Full stack: PostgreSQL + Kafka (KRaft, single node) + API + Gateway.
#   docker compose up --build
# API: http://localhost:8080 (management 9090) · Gateway: http://localhost:8090 (management 9091)
# The outbox publishes to REAL Kafka here (fraud.outbox.publisher=kafka).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Official Apache image (the bitnami/kafka catalog was withdrawn from Docker Hub in 2025).
    image: apache/kafka:3.9.1
    environment:
      # Single-node KRaft (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # single broker -> internal topics can't have replication factor > 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"

  api:
    build:
      context: .
      args:
        MODULE: fraud-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # Postgres instead of the dev H2 (Flyway migrates the schema on startup)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: fraud
      SPRING_DATASOURCE_PASSWORD: fraud
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_SHOW_SQL: "false"
      # Outbox -> real Kafka (relaxed binding: FRAUD_OUTBOX_PUBLISHER -> fraud.outbox.publisher)
      FRAUD_OUTBOX_PUBLISHER: kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Dev-compose secrets — replace for anything beyond local use
      FRAUD_JWT_SECRET: compose-dev-secret-key-change-me-32+chars-minimum
      FRAUD_ADMIN_PASSWORD: fraud123
      FRAUD_ANALYST_PASSWORD: analyst123
    ports:
      - "8080:8080"
      - "9090:9090"

  gateway:
    build:
      context: .
      args:
        MODULE: fraud-gateway
    depends_on:
      - api
    environment:
      FRAUD_API_URI: http://api:8080
      FRAUD_API_MANAGEMENT_URI: http://api:9090
    ports:
      - "8090:8090"
      - "9091:9091"
