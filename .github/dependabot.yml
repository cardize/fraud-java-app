# Automated dependency update PRs (external review finding G).
version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Keeps the digest-pinned base images in the Dockerfile bumped.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
