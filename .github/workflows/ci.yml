# CI: build + full test suite (unit, MockMvc integration, Testcontainers against real
# Postgres+Kafka — Docker is available on GitHub-hosted runners), then validate both images.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        run: mvn -B verify

      # Surefire XML/txt reports are only interesting when something failed.
      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*'
          retention-days: 7

  docker-images:
    # Image build validates the Dockerfile on every push to master; PRs are covered by the
    # test job alone (faster feedback, no registry involved).
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --build-arg MODULE=fraud-api -t fraud-api:ci .

      - name: Build gateway image
        run: docker build --build-arg MODULE=fraud-gateway -t fraud-gateway:ci .
