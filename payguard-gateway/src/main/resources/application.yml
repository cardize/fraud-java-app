# API Gateway konfigürasyonu
# .NET karşılığı: ocelot.json (Routes: DownstreamHostAndPorts / UpstreamPathTemplate)

server:
  port: 8090                 # .NET External API ~5292

spring:
  application:
    name: payguard-gateway
  cloud:
    gateway:
      routes:
        # Tüm /api/** isteklerini Internal API'ye (8080) ilet
        # Ocelot: UpstreamPathTemplate /api/v1/{everything} -> DownstreamHostAndPorts localhost:8080
        - id: internal-api
          uri: http://localhost:8080
          predicates:
            - Path=/api/**
        # Actuator health'i de geçir (Ocelot'taki /jobs, /FraudService.svc benzeri ek route'lar buraya)
        - id: internal-actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**
      # Basit global CORS (Ocelot CORS politikası karşılığı)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
