# API Gateway konfigürasyonu

server:
  port: 8090

spring:
  application:
    name: payguard-gateway
  cloud:
    gateway:
      routes:
        # Tüm /api/** isteklerini arka API'ye (8080) ilet
        - id: internal-api
          uri: http://localhost:8080
          predicates:
            - Path=/api/**
        # Actuator health'i de geçir
        - id: internal-actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**
      # CORS: kaynak listesi açıkça belirtilir. "*" + allowCredentials kombinasyonu tarayıcılarca
      # zaten reddedilir; ama "*" origin/method/header üçü birden üretimde gereksiz geniş bir
      # yüzey açar. Gerçek origin'leri PAYGUARD_ALLOWED_ORIGINS ile (virgülle ayrık) verin.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${PAYGUARD_ALLOWED_ORIGINS:http://localhost:*}"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [Authorization, Content-Type, X-Tenant]
            allowCredentials: true
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
