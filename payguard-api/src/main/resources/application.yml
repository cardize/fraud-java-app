# PayGuard — uygulama konfigürasyonu

spring:
  application:
    name: payguard

  # Java 21 sanal thread'leri — bloklayan istek/IO işlerinde yüksek eşzamanlılık (düşük bellek).
  threads:
    virtual:
      enabled: true

  # H2 in-memory veritabanı (geliştirme/çalıştırma için).
  # Üretimde PostgreSQL'e geçilir: org.postgresql:postgresql + url jdbc:postgresql://...
  datasource:
    url: jdbc:h2:mem:payguard;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # Sanal thread'ler (yukarıda) çok sayıda eşzamanlı isteğe izin verir; DB havuzu BUNDAN BAĞIMSIZ
    # ve sınırlı kalmalı — aksi halde DB az sayıda gerçek bağlantıyla boğulur. Havuz dolarsa istek
    # sonsuza dek beklemek yerine 3 saniyede hızlıca başarısız olur (connection-timeout).
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # Şema artık FLYWAY'in sorumluluğunda (db/migration/V*.sql). Hibernate sadece kullanır.
      # İpucu: doğruladıktan sonra 'validate'e çekersen entity-şema uyumu derleme sonrası kontrol edilir.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway: classpath:db/migration altındaki V*.sql dosyalarını sırayla uygular.
  flyway:
    enabled: true
    baseline-on-migrate: true
  # Liquibase varsayılanda KAPALI (Flyway ile çakışmasın). 'liquibase' profiliyle açılır.
  liquibase:
    enabled: false

  h2:
    console:
      enabled: true         # http://localhost:8080/h2-console ile DB'yi gör

  # Cache sağlayıcısı. Varsayılan: Caffeine (sınırlı boyut + TTL) — Redis kurmadan çalışır.
  # Redis için: uygulamayı 'redis' profiliyle başlat (--spring.profiles.active=redis), bkz. application-redis.yml
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  # Düzgün kapanış: yeni istek kabul edilmez, devam edenler tamamlanır (deploy güvenliği).
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  shutdown: graceful

# Senaryo motoru ayarları
payguard:
  scenario:
    parallel: true
    max-parallelism: 10
  persistence:
    # İşlem yazımı için adapter seçimi: jpa (varsayılan) | jdbc (ham SQL hot-path)
    transaction-store: jpa
  ai:
    # Anomali tespiti açık/kapalı
    enabled: true
  security:
    # HMAC-SHA256 için en az 256-bit (32+ karakter) gizli anahtar.
    # Üretimde PAYGUARD_JWT_SECRET ortam değişkeniyle override edilir; gömülü değer yalnızca dev içindir.
    jwt-secret: "${PAYGUARD_JWT_SECRET:payguard-dev-secret-key-change-me-please-32+chars}"
    jwt-expiration-ms: "${PAYGUARD_JWT_EXPIRATION_MS:3600000}"   # 1 saat
    demo-password: "${PAYGUARD_DEMO_PASSWORD:payguard123}"
  outbox:
    poll-interval-ms: 5000
    destination: "payguard.offline-operations"
    # Yayımcı: logging (varsayılan, broker'sız) | kafka | rabbit
    publisher: logging

# Actuator: sağlık/metrik uçları. /actuator/health public.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    # Broker'lar opsiyonel; çalışmıyorken /actuator/health DOWN olmasın
    rabbit:
      enabled: false

logging:
  level:
    com.payguard: INFO
