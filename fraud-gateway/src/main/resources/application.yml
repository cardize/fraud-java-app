# API Gateway configuration

server:
  port: 8090

spring:
  application:
    name: fraud-gateway
  cloud:
    gateway:
      routes:
        # Forward all /api/** requests to the backing API. The target is env-overridable so the
        # same image works in docker-compose (http://api:8080) and locally (default).
        - id: internal-api
          uri: "${FRAUD_API_URI:http://localhost:8080}"
          predicates:
            - Path=/api/**
        # Actuator (health/metrics/prometheus) now lives on the API's separate management port
        # (9090) — see fraud-api/application.yml. We kept this route (with an updated target)
        # so it stays reachable through the gateway from the internal network when needed.
        - id: internal-actuator
          uri: "${FRAUD_API_MANAGEMENT_URI:http://localhost:9090}"
          predicates:
            - Path=/actuator/**
      # CORS: the origin list is explicit. Browsers already reject "*" + allowCredentials
      # together; but "*" for origin/method/header all at once opens an unnecessarily wide
      # surface in production. Provide the real origins via FRAUD_ALLOWED_ORIGINS (comma-separated).
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${FRAUD_ALLOWED_ORIGINS:http://localhost:*}"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [Authorization, Content-Type, X-Tenant]
            allowCredentials: true
            maxAge: 3600

# The gateway's own actuator is also on a separate port — it must not be reachable
# unauthenticated on the public proxy port (8090); the gateway carries no JWT layer of its own,
# it is a pure reverse proxy.
management:
  server:
    port: "${FRAUD_GATEWAY_MANAGEMENT_PORT:9091}"
  endpoints:
    web:
      exposure:
        include: health,gateway
