# 'multitenant' profili — DataSource tenant'a göre yönlendirilir (MultiTenantDataSourceConfig devreye girer).
#   mvn -pl payguard-api -am spring-boot:run -Dspring-boot.run.profiles=multitenant
# İstekte tenant seçimi:  -H "X-Tenant: alpha"   (yoksa varsayılan DB)
#
# Şema her tenant DB'sine MultiTenantFlywayMigrator ile ayrı ayrı uygulanır (@PostConstruct).

spring:
  flyway:
    # Boot'un tek-DataSource otomatik Flyway'i kapalı; migration'ı tenant başına biz koşuyoruz.
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none       # şema Flyway'in (per-tenant) sorumluluğunda
